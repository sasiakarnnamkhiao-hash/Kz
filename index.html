<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Skin Collage Builder</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --miku-green: #39C5BB;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Glassmorphism Header */
        .controls {
            position: sticky;
            top: 20px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        
        label { font-size: 0.8rem; color: var(--miku-green); text-transform: uppercase; letter-spacing: 1px; }

        input[type="number"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--miku-green);
            color: white;
            padding: 8px;
            border-radius: 8px;
            width: 80px;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-upload { background: var(--miku-green); color: #000; }
        .btn-export { background: #f43f5e; color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 0 15px var(--miku-green); }

        /* Collage Area */
        #collage-container {
            display: grid;
            gap: 0; /* Ultra-tight */
            background: #000;
            width: fit-content;
            margin: 0 auto;
            border: 2px solid var(--miku-green);
            min-height: 200px;
            min-width: 200px;
        }

        .skin-item {
            position: relative;
            cursor: grab;
            overflow: hidden;
            background: #000;
        }

        .skin-item img {
            width: 100%;
            display: block;
            object-fit: contain;
        }

        .skin-item:active { cursor: grabbing; }

        /* Remove Button */
        .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            display: none;
        }
        .skin-item:hover .remove-btn { display: block; }

        .hidden { display: none; }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">กำลังประมวลผลรูปภาพ...</div>

    <div class="controls">
        <div class="input-group">
            <label>รูปต่อแถว</label>
            <input type="number" id="col-count" value="10" min="1">
        </div>
        
        <input type="file" id="file-input" multiple accept="image/*" class="hidden">
        <button class="btn btn-upload" onclick="document.getElementById('file-input').click()">
            + เพิ่มสกิน (Bulk Upload)
        </button>

        <button class="btn btn-export" onclick="exportCollage()">
            💾 บันทึกเป็นรูปภาพ
        </button>
        
        <div style="font-size: 0.9rem; color: #94a3b8;">
            จำนวน: <span id="skin-count" style="color: var(--miku-green);">0</span>
        </div>
    </div>

    <div id="collage-container"></div>

    <script>
        const container = document.getElementById('collage-container');
        const colInput = document.getElementById('col-count');
        const skinCountSpan = document.getElementById('skin-count');
        const loading = document.getElementById('loading-overlay');

        // ปรับแต่ง Grid ตามจำนวนคอลัมน์
        function updateLayout() {
            const cols = colInput.value || 10;
            container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        }

        colInput.addEventListener('input', updateLayout);

        // ระบบตัดขอบใสอัตโนมัติ (Auto-Crop)
        async function processImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { willReadFrequently: true });
                    
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;

                    // สแกนหาพิกเซลที่ไม่โปร่งใส
                    for (let y = 0; y < canvas.height; y++) {
                        for (let x = 0; x < canvas.width; x++) {
                            const alpha = data[(y * canvas.width + x) * 4 + 3];
                            if (alpha > 0) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }

                    // สร้าง Canvas ใหม่ที่ตัดขอบแล้ว
                    const croppedCanvas = document.createElement('canvas');
                    const width = maxX - minX + 1;
                    const height = maxY - minY + 1;
                    croppedCanvas.width = width;
                    croppedCanvas.height = height;
                    
                    const croppedCtx = croppedCanvas.getContext('2d');
                    croppedCtx.drawImage(img, minX, minY, width, height, 0, 0, width, height);
                    
                    resolve(croppedCanvas.toDataURL());
                    URL.revokeObjectURL(img.src);
                };
            });
        }

        // จัดการการอัปโหลด
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            loading.style.display = 'flex';

            for (const file of files) {
                const croppedDataUrl = await processImage(file);
                
                const div = document.createElement('div');
                div.className = 'skin-item';
                div.innerHTML = `
                    <button class="remove-btn" onclick="this.parentElement.remove(); updateCounter();">×</button>
                    <img src="${croppedDataUrl}">
                `;
                container.appendChild(div);
            }

            updateLayout();
            updateCounter();
            loading.style.display = 'none';
        });

        function updateCounter() {
            skinCountSpan.innerText = container.children.length;
        }

        // ระบบ Drag & Drop
        new Sortable(container, {
            animation: 150,
            ghostClass: 'blue-background-class'
        });

        // ระบบ Export
        async function exportCollage() {
            if (container.children.length === 0) return alert('กรุณาเพิ่มรูปก่อนครับเอย!');
            
            loading.style.display = 'flex';
            
            // ซ่อนปุ่มลบก่อนเซฟ
            const removes = document.querySelectorAll('.remove-btn');
            removes.forEach(b => b.style.display = 'none');
            
            try {
                const canvas = await html2canvas(container, {
                    backgroundColor: '#000000',
                    scale: 2, // เพิ่มความชัด 2 เท่า
                    useCORS: true
                });
                
                const link = document.createElement('a');
                link.download = `skin-collage-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการบันทึก');
            } finally {
                removes.forEach(b => b.style.display = '');
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
